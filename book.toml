[book]
title = "T4n OS Documentation"
authors = ["T4n Labs"]
src = "src"

[output.html]
theme = "src/theme"
default-theme = "t4n-dark"
preferred-dark-theme = "t4n-light"
site-url = "/t4n-os_docs/"
git-repository-url = "https://github.com/T4n-Labs/"
edit-url-template = "https://github.com/T4n-Labs/t4n-os_docs/edit/main/{path}"
input-404 = "404.md"


[output.typst]
optional = true

[output.typst.output]
format = "pdf"

[output.typst.style]
paper = "us-letter"
text-font = "Libertinus Serif"
link-color = "black"
# XXX: needs fix for zeros showing up
# heading-numbering = "1.1"

[output.typst.advanced]
typst-markup-header = """
#let voidgreen = rgb("#478061")
#set page(paper: "us-letter")
#align(center + horizon)[
    #image("handbook-cover.svg")
    #title()
]
#pagebreak()
#set page(
    header: [_The Void Linux Handbook_],
    numbering: "1",
)
#set par(justify: true)
#set table(
    stroke: (x, y) => if y != 0 { 0.5pt } else { voidgreen },
    fill: (x, y) => if y == 0 { voidgreen },
)
#show table.cell.where(y: 0): it => {
    set text(white)
    strong(it)
}
#show raw.where(block: false): box.with(fill: luma(240), inset: (x: 3pt, y: 0pt), outset: (y: 3pt), radius: 2pt)
#show raw.where(block: true): box.with(fill: luma(240), inset: 8pt, radius: 3pt)
// XXX: needs fix for zeros showing up
#let skip_zeros(..args) = {
    numbering("1.1", ..args.pos().filter((i) => i != 0))
}
#set heading(numbering: skip_zeros)
"""

[output.gemini]
optional = true